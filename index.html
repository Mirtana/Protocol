<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirtanaProtocol | DeFi</title>
    <link rel="stylesheet" href="style-header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

</head>

<body>


    <header class="header">
        <div class="header-left">

            <img src="MIRTAlogo.png" alt="Mirtana" class="logo">

            <span class="brand-name">MirtanaProtocol</span>
        </div>

        <div class="header-right">
            <div id="balances" class="balances hidden">
                <div class="balance-item">
                    
                    <i class="fab fa-ethereum"></i> <span id="native-balance">0.00</span>

                </div>
                <div class="balance-item highlight">

                    <i class="fas fa-coins"></i> MIRTA: <span id="mirta-balance">0.00</span>

                </div>
            </div>

            <div class="dropdown" id="network-dropdown">

                <button class="dropbtn" id="current-network"><i class="fas fa-network-wired"></i> Robinhood Chain</button>
                
                <div class="dropdown-content" id="network-list">

                    <a href="#" data-chain-id="0x51c">Robinhood Chain</a> 
                
                </div>
            </div>

            <button id="connect-btn" class="connect-button"><i class="fas fa-wallet"></i> Connect Wallet</button>
        </div>
    </header>


    <main class="main-content">

        
    </main>


    <footer class="footer">
        <div class="container footer-content">
            <p class="copyright">© 2026 Mirtana Protocol. Built for Robinhood Chain Testnet.</p>
            <div class="social-links">
                <a href="https://x.com/MirtanaProtocol"target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://t.me/mirtanaprotocol"target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://discord.gg/SdwEBqRrQj"target="_blank"><i class="fab fa-discord"></i></a>
                <a href="https://github.com/Mirtana/Protocol.git"target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>


    <script src="app-connect.js"></script>

    <canvas id="circuitCanvas"></canvas>

    <script src="background.js"></script>

</body>
</html>
